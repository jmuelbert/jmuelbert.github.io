<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dunklerer Hintergrund für maximalen Kontrast -->
  <rect width="40" height="40" rx="8" fill="#0f172a"/>

  <!-- Linke Klammer - Helleres Blau für besseren Glow-Effekt -->
  <path d="M14 12L10 20L14 28" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rechter Kern - Helleres Blau -->
  <path d="M26 12L30 20L26 28" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Zentraler Block - Reinweiß für Fokus -->
  <rect x="17" y="17" width="6" height="6" rx="1" fill="#ffffff"/>
</svg>
